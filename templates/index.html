<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Document</title>
</head>

<body>
<header>
    <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo">
</header>

<main>
    {% for topico in topicos %}
        <div class="container">
            <div class="topico">
                <img class="topico_img" src="{{ url_for('static', filename='img/Radio.png') }}" alt="Icone">
                <h1 class="topico_titulo">{{ topico.nome }}</h1>
            </div>

            <ul class="subscriber_list">
                {% for subscriber in topico.subscribers %}
                    <li class="subscriber">
                        <img class="subscriber_img" src="{{ url_for('static', filename='img/account.png') }}"
                             alt="conta">
                        <p>{{ subscriber }}</p>
                    </li>
                {% endfor %}
            </ul>

        </div>
    {% endfor %}

</main>

</body>

</html>
